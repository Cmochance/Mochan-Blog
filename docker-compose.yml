version: '3.8'

services:
  # 博客应用
  mochan-blog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mochan-blog
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # 持久化文章目录，方便更新
      - ./posts:/app/posts
    networks:
      - mochan-network
    labels:
      - "com.docker.compose.project=mochan"

  # Nginx 反向代理（可选，用于生产环境）
  nginx:
    image: nginx:alpine
    container_name: mochan-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - mochan-blog
    networks:
      - mochan-network

networks:
  mochan-network:
    driver: bridge
