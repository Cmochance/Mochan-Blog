<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>墨韵流芳 | 水墨风博客</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- 水墨背景画布 -->
  <canvas id="ink-canvas"></canvas>
  
  <!-- 宣纸纹理叠加层 -->
  <div class="paper-texture"></div>

  <!-- 登录模态框 -->
  <div id="login-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title">执笔登录</h2>
        <button class="modal-close" onclick="blog.closeLoginModal()">&times;</button>
      </div>
      <form id="login-form" class="login-form">
        <div class="form-group">
          <label class="form-label">笔名</label>
          <input type="text" id="login-username" class="form-input" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label class="form-label">墨印</label>
          <input type="password" id="login-password" class="form-input" placeholder="请输入密码" required>
        </div>
        <div id="login-error" class="form-error"></div>
        <button type="submit" class="form-submit">落笔</button>
      </form>
    </div>
  </div>
  
  <!-- 主容器 -->
  <div class="container">
    <!-- 导航 -->
    <nav class="nav">
      <a href="/" class="nav-logo" data-link>
        <span class="logo-char">墨</span>
        <span class="logo-text">韵流芳</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link active" data-link>首页</a>
        <a href="/archive" class="nav-link" data-link>归档</a>
        <a href="/about" class="nav-link" data-link>关于</a>
      </div>
    </nav>

    <!-- 文章编辑区（登录后显示） -->
    <div id="editor-panel" class="editor-panel" style="display: none;">
      <div class="editor-header">
        <span class="editor-icon">✒</span>
        <span class="editor-title">挥毫泼墨</span>
        <button class="editor-toggle" onclick="blog.toggleEditor()">
          <span id="editor-toggle-icon">▼</span>
        </button>
      </div>
      <div id="editor-content" class="editor-content">
        <div class="form-group">
          <input type="text" id="post-title" class="form-input editor-input" placeholder="标题 - 落笔之前，先有其意">
        </div>
        <div class="form-group">
          <input type="text" id="post-tags" class="form-input editor-input" placeholder="标签（用逗号分隔）">
        </div>
        <div class="form-group">
          <textarea id="post-content" class="form-input editor-textarea" placeholder="正文 - 支持 Markdown 语法&#10;&#10;# 一级标题&#10;## 二级标题&#10;**加粗** *斜体*&#10;- 列表项&#10;> 引用&#10;`代码`"></textarea>
        </div>
        <div class="editor-actions">
          <button class="editor-btn editor-btn-secondary" onclick="blog.clearEditor()">清空</button>
          <button class="editor-btn editor-btn-primary" onclick="blog.publishPost()">发布文章</button>
        </div>
        <div id="editor-message" class="editor-message"></div>
      </div>
    </div>

    <!-- 内容区域 -->
    <main id="app">
      <!-- 首页内容 -->
      <section class="hero">
        <div class="hero-content">
          <h1 class="hero-title">
            <span class="brush-stroke">墨</span>
            <span class="brush-stroke" style="animation-delay: 0.3s">韵</span>
            <span class="brush-stroke" style="animation-delay: 0.6s">流</span>
            <span class="brush-stroke" style="animation-delay: 0.9s">芳</span>
          </h1>
          <p class="hero-subtitle">落笔成墨，心随意走</p>
          <div class="hero-decoration">
            <svg class="bamboo" viewBox="0 0 100 200">
              <path d="M50 200 Q48 150 50 100 Q52 50 50 0" stroke="currentColor" fill="none" stroke-width="3"/>
              <path d="M50 160 Q30 140 20 150" stroke="currentColor" fill="none" stroke-width="2"/>
              <path d="M50 100 Q70 80 80 90" stroke="currentColor" fill="none" stroke-width="2"/>
              <path d="M50 50 Q30 30 15 40" stroke="currentColor" fill="none" stroke-width="2"/>
            </svg>
          </div>
        </div>
      </section>

      <!-- 文章列表 -->
      <section class="posts-section">
        <h2 class="section-title">
          <span class="title-decoration">〖</span>
          近期文章
          <span class="title-decoration">〗</span>
        </h2>
        <div id="posts-list" class="posts-list">
          <!-- 文章卡片将通过JS动态加载 -->
          <div class="loading">
            <div class="ink-drop"></div>
            <span>墨迹渲染中...</span>
          </div>
        </div>
      </section>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
      <div id="auth-btn" class="footer-seal" onclick="blog.handleAuthClick()" title="">印</div>
      <p class="footer-text">墨韵流芳 © 2026</p>
      <p class="footer-quote">「水墨丹青，意在笔先」</p>
    </footer>
  </div>

  <script src="/js/ink-background.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
